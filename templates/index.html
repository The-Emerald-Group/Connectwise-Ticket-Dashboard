<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConnectWise Ticket Dashboard</title>

<style>
  :root {
    --crit: #ff3b30;
    --warn: #ffcc00;
    --good: #4cd964;
    --stale: #444444;
    --bg: #0a0a0a;
    --card-bg: #161616;
    --card-hover: #1e1e1e;
    --border: #222;
    --text: #ffffff;
    --text-dim: #888888;
    --text-muted: #555555;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

  /* ── HEADER ── */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px;
    border-bottom: 1px solid #222;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { font-size: 1rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: white; }
  .clock-box { text-align: right; }
  .harvest-time { font-size: 1.2rem; font-weight: bold; color: var(--good); }
  .harvest-label { font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }

  /* ── CONFIG WARNING ── */
  .config-warning { background: rgba(255,59,48,0.07); border-left: 3px solid var(--crit); padding: 14px 24px; margin: 16px 20px; display: none; }
  .config-warning.visible { display: block; }
  .config-warning h3 { color: var(--crit); font-size: .85rem; margin-bottom: 6px; letter-spacing: 1px; }
  .config-warning p { font-size: .8rem; color: var(--text-dim); line-height: 1.8; }
  .config-warning code { background: rgba(255,255,255,.06); padding: 1px 6px; color: var(--warn); }

  /* ── MAIN ── */
  main { padding: 20px; }

  /* ── SECTION HEADER ── */
  .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid #222; }
  .section-title { font-size: .8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); }
  .count-pill { font-size: .7rem; font-weight: 700; padding: 2px 9px; border-radius: 20px; background: var(--crit); color: white; }
  .section-subtitle { font-size: .72rem; color: var(--text-muted); }
  .section-gap { margin-bottom: 40px; }

  /* ── TOP ROW ── */
  .top-row { display: flex; gap: 20px; align-items: flex-start; }
  .oldest-section { flex: 1; min-width: 0; }
  .oldest-label { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--crit); margin-bottom: 12px; }
  .section-divider { border-top: 1px solid #222; margin: 20px 0; }

  /* ── GRID ── */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; align-items: start; }

  /* ── CARDS ── */
  .card { padding: 20px; border-radius: 12px; background: var(--card-bg); border-left: 10px solid; transition: 0.3s; }
  .card.Red   { border-color: var(--crit); }
  .card.Amber { border-color: var(--warn); }
  .card.Green { border-color: var(--good); opacity: 0.6; }
  .card:hover { opacity: 1 !important; background: var(--card-hover); }
  .expandable-card { cursor: pointer; user-select: none; }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .owner-name { font-size: 1.1rem; font-weight: 700; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .expand-icon { font-size: 0.7rem; color: var(--text-muted); margin-left: 6px; display: inline-block; transition: transform 0.2s ease; }
  .card-meta { font-size: .75rem; color: #888; margin-top: 3px; text-transform: uppercase; letter-spacing: 1px; }
  .ticket-count-badge { font-size: 2.2rem; font-weight: 800; line-height: 1; flex-shrink: 0; }
  .ticket-count-badge.red   { color: var(--crit); }
  .ticket-count-badge.amber { color: var(--warn); }
  .ticket-count-badge.green { color: var(--good); }

  .sev-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .sev-badge { font-size: .7rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
  .sev-badge.crit { background: rgba(255,59,48,.2); color: var(--crit); border: 1px solid rgba(255,59,48,.3); }
  .sev-badge.warn { background: rgba(255,204,0,.15); color: var(--warn); border: 1px solid rgba(255,204,0,.25); }

  /* ── TICKET LIST ── */
  .ticket-list { display: none; margin-top: 15px; border-top: 1px solid #222; padding-top: 15px; cursor: default; }

  .issue-item { margin-bottom: 8px; padding: 10px 12px; border-radius: 4px; border-left: 4px solid; }
  .sev-critical { border-left-color: var(--crit); background: rgba(255,59,48,0.08); }
  .sev-warning  { border-left-color: var(--warn); background: rgba(255,204,0,0.05); }
  .sev-stale    { border-left-color: var(--stale); background: rgba(255,255,255,0.02); }

  .issue-summary { font-size: .85rem; font-weight: 600; display: block; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: white; }
  .sev-stale .issue-summary { color: #555; font-style: italic; }

  .stale-hours { display: inline-block; font-size: .7rem; font-weight: 700; padding: 1px 7px; border-radius: 20px; margin-left: 6px; vertical-align: middle; }
  .sev-critical .stale-hours { background: rgba(255,59,48,.2); color: var(--crit); }
  .sev-warning  .stale-hours { background: rgba(255,204,0,.15); color: var(--warn); }
  .sev-stale    .stale-hours { background: rgba(68,68,68,.3); color: #666; }

  .instruction { display: block; font-size: .8rem; font-weight: bold; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .instruction a { color: inherit; text-decoration: none; }
  .instruction a:hover { color: var(--good); }
  .sev-stale .instruction { color: #666; font-style: italic; }
  .instruction a { color: inherit; text-decoration: none; }
  .instruction a:hover { color: var(--good); }

  /* ── SIDEBAR ── */
  .sidebar-cards { display: flex; flex-direction: column; gap: 20px; width: 220px; flex-shrink: 0; }
  .summary-card { background: var(--card-bg); border-left: 10px solid; border-radius: 12px; padding: 20px; }
  .summary-card.Red   { border-color: var(--crit); }
  .summary-card.Amber { border-color: var(--warn); }
  .summary-card.Green { border-color: var(--good); }
  .summary-label { font-size: .7rem; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 4px; }
  .summary-name { font-size: 1rem; font-weight: 700; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 8px; }
  .summary-count { font-size: 3rem; font-weight: 800; line-height: 1; text-align: center; padding: 8px 0; }
  .summary-count.red   { color: var(--crit); }
  .summary-count.amber { color: var(--warn); }
  .summary-count.green { color: var(--good); }

  /* ── STATES ── */
  .loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: #888; gap: 12px; font-size: .8rem; }
  .spinner { width: 18px; height: 18px; border: 2px solid #333; border-top-color: var(--good); border-radius: 50%; animation: spin .8s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { padding: 30px; color: var(--crit); font-size: .8rem; }
  .empty-state { text-align: center; padding: 48px 24px; }
  .empty-state .big-check { font-size: 2.5rem; margin-bottom: 8px; }
  .empty-state p { color: #888; font-size: .8rem; text-transform: uppercase; letter-spacing: 1px; }
</style>
</head>
<body>

<header>
  <div class="logo">ConnectWise Ticket Dashboard</div>
  <div class="clock-box">
    <div class="harvest-time" id="last-updated-label">—</div>
    <div class="harvest-label">Last Harvest</div>
  </div>
</header>

<div class="config-warning" id="config-warning">
  <h3>// API NOT CONFIGURED</h3>
  <p>Set <code>CW_SITE</code>, <code>CW_COMPANY</code>, <code>CW_PUBLIC_KEY</code>, <code>CW_PRIVATE_KEY</code>, <code>CW_CLIENT_ID</code> in your docker-compose.yml environment section.</p>
</div>

<main>
  <div class="section-gap">
    <div class="section-header">
      <span class="section-title">Stale Tickets</span>
      <span class="count-pill" id="stale-count-pill">—</span>
      <span class="section-subtitle">open · not updated in 24h+ · grouped by owner</span>
    </div>
    <div id="stale-container"><div class="loading"><div class="spinner"></div>LOADING...</div></div>
  </div>
</main>

<script>
let REFRESH_INTERVAL = parseInt('{{ refresh_interval }}') || 300;
const THRESH_RED   = {{ thresh_red }};
const THRESH_AMBER = {{ thresh_amber }};
let countdown = REFRESH_INTERVAL;

// Auto-refresh countdown (silent)
setInterval(() => {
  countdown--;
  if (countdown <= 0) { countdown = REFRESH_INTERVAL; refreshAll(); }
}, 1000);

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
}

function sevClass(hours) {
  if (hours >= 48) return 'sev-critical';
  if (hours >= 24) return 'sev-warning';
  return 'sev-stale';
}

function ownerCardClass(count) {
  if (count >= THRESH_RED)   return 'Red';
  if (count >= THRESH_AMBER) return 'Amber';
  return 'Green';
}

function toggleTickets(event, card) {
  if (event.target.closest('a')) return;
  const list = card.querySelector('.ticket-list');
  if (!list) return;
  const icon = card.querySelector('.expand-icon');
  if (list.style.display === 'none' || !list.style.display) {
    list.style.display = 'block';
    if (icon) icon.style.transform = 'rotate(180deg)';
  } else {
    list.style.display = 'none';
    if (icon) icon.style.transform = 'rotate(0deg)';
  }
}

async function loadStaleTickets() {
  const el = document.getElementById('stale-container');
  const pill = document.getElementById('stale-count-pill');
  try {
    const res = await fetch('/api/stale-tickets');
    const data = await res.json();
    if (data.error) { el.innerHTML = `<div class="error-msg">// ERROR: ${data.error}</div>`; pill.textContent='ERR'; return; }
    pill.textContent = data.count;
    if (!data.tickets.length) {
      el.innerHTML = `<div class="empty-state"><div class="big-check">✓</div><p>All tickets up to date</p></div>`;
      return;
    }

    const allSorted = [...data.tickets].sort((a,b) => (b.hoursStale||0) - (a.hoursStale||0));

    // Top 5 oldest
    const top5 = allSorted.slice(0, 5);
    const top5HTML = top5.map(t => {
      const sc = sevClass(t.hoursStale||0);
      const h = t.hoursStale !== null ? t.hoursStale : '?';
      const url = `https://${window._cwSite||'eu.myconnectwise.net'}/v4_6_release/services/system_io/Service/fv_sr100_request.rails?service_recid=${t.id}`;
      return `<div class="issue-item ${sc}">
        <span class="issue-summary">#${t.id} — ${t.summary||'(no summary)'}<span class="stale-hours">${h}h</span></span>
        <span class="instruction"><a href="${url}" target="_blank">${t.owner||'Unassigned'} · ${t.company||''} · ${t.board||''} · ${t.status||''} · ${fmtDate(t.lastUpdated)}</a></span>
      </div>`;
    }).join('');

    // Group by owner
    const byOwner = {};
    for (const t of data.tickets) {
      const owner = t.owner || 'Unassigned';
      if (!byOwner[owner]) byOwner[owner] = [];
      byOwner[owner].push(t);
    }
    const ownersSorted = Object.entries(byOwner).sort(([,a],[,b]) => b.length - a.length);

    // Owner grid cards
    const ownerCards = ownersSorted.map(([owner, tickets]) => {
      const cls = ownerCardClass(tickets.length);
      const critCount = tickets.filter(t => (t.hoursStale||0) >= 48).length;
      const warnCount = tickets.filter(t => (t.hoursStale||0) >= 24 && (t.hoursStale||0) < 48).length;
      const badges = [
        critCount > 0 ? `<span class="sev-badge crit">${critCount} × 48H+</span>` : '',
        warnCount > 0 ? `<span class="sev-badge warn">${warnCount} × 24H+</span>` : ''
      ].filter(Boolean).join('');

      const issueHTML = tickets.map(t => {
        const sc = sevClass(t.hoursStale||0);
        const h = t.hoursStale !== null ? t.hoursStale : '?';
        const url = `https://${window._cwSite||'eu.myconnectwise.net'}/v4_6_release/services/system_io/Service/fv_sr100_request.rails?service_recid=${t.id}`;
        return `<div class="issue-item ${sc}">
          <span class="issue-summary">#${t.id} — ${t.summary||'(no summary)'}<span class="stale-hours">${h}h</span></span>
          <span class="instruction"><a href="${url}" target="_blank">${t.company||''} · ${t.board||''} · ${t.status||''} · ${fmtDate(t.lastUpdated)}</a></span>
        </div>`;
      }).join('');

      return `<div class="card ${cls} expandable-card" onclick="toggleTickets(event, this)">
        <div class="card-top">
          <div style="min-width:0;flex:1">
            <div class="owner-name">${owner}<span class="expand-icon">▼</span></div>
            <div class="card-meta">${tickets.length} stale ticket${tickets.length !== 1 ? 's' : ''}</div>
          </div>
          <div class="ticket-count-badge ${cls.toLowerCase()}">${tickets.length}</div>
        </div>
        <div class="sev-badges">${badges}</div>
        <div class="ticket-list">${issueHTML}</div>
      </div>`;
    }).join('');

    // Sidebar: unassigned
    const unassignedTickets = data.tickets.filter(t => !t.owner || t.owner === 'Unassigned');
    const unassignedHTML = (() => {
      const count = unassignedTickets.length;
      if (count === 0) return '';
      const cls = ownerCardClass(count);
      const critCount = unassignedTickets.filter(t => (t.hoursStale||0) >= 48).length;
      const warnCount = unassignedTickets.filter(t => (t.hoursStale||0) >= 24 && (t.hoursStale||0) < 48).length;
      const badges = [
        critCount > 0 ? `<span class="sev-badge crit">${critCount} × 48H+</span>` : '',
        warnCount > 0 ? `<span class="sev-badge warn">${warnCount} × 24H+</span>` : ''
      ].filter(Boolean).join('');
      return `<div class="summary-card ${cls}">
        <div class="summary-label">⚠ Unassigned</div>
        <div class="summary-name">No Owner</div>
        <div class="summary-count ${cls.toLowerCase()}">${count}</div>
        <div class="sev-badges">${badges}</div>
      </div>`;
    })();

    // Sidebar: top owner
    const topOwnerHTML = ownersSorted[0] ? (() => {
      const [owner, tickets] = ownersSorted[0];
      const cls = ownerCardClass(tickets.length);
      const critCount = tickets.filter(t => (t.hoursStale||0) >= 48).length;
      const warnCount = tickets.filter(t => (t.hoursStale||0) >= 24 && (t.hoursStale||0) < 48).length;
      const badges = [
        critCount > 0 ? `<span class="sev-badge crit">${critCount} × 48H+</span>` : '',
        warnCount > 0 ? `<span class="sev-badge warn">${warnCount} × 24H+</span>` : ''
      ].filter(Boolean).join('');
      return `<div class="summary-card ${cls}">
        <div class="summary-label">Most Tickets</div>
        <div class="summary-name">${owner}</div>
        <div class="summary-count ${cls.toLowerCase()}">${tickets.length}</div>
        <div class="sev-badges">${badges}</div>
      </div>`;
    })() : '';

    el.innerHTML = `
      <div class="top-row">
        <div class="oldest-section">
          <div class="oldest-label">// Top 5 Oldest</div>
          ${top5HTML}
        </div>
        <div class="sidebar-cards">
          ${unassignedHTML}
          ${topOwnerHTML}
        </div>
      </div>
      <div class="section-divider"></div>
      <div class="grid">${ownerCards}</div>`;
  } catch(e) {
    el.innerHTML = `<div class="error-msg">// ERROR: ${e.message}</div>`;
  }
}

async function checkConfig() {
  try {
    const data = await fetch('/api/config-check').then(r=>r.json());
    window._cwSite = (data.site || '').replace(/^api-/, '');
    if (!data.configured) document.getElementById('config-warning').classList.add('visible');
  } catch(e) {}
}

function refreshAll() {
  const now = new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('last-updated-label').textContent = now;
  loadStaleTickets();
}

checkConfig();
refreshAll();
</script>
</body>
</html>
